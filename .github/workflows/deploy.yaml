name: CI/CD Pipeline - Portfolio Prime

on:
  push:
    branches: [main, develop]

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  # =======================================================
  # FASE 1: AUDITORÍA ESTÁTICA (Código y Secretos)
  # =======================================================
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🕵️‍♂️ Trufflehog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.sha }}

      - name: 🐳 Hadolint (Linter de Dockerfiles)
        run: |
          docker run --rm -i hadolint/hadolint < ./frontend/Dockerfile
          docker run --rm -i hadolint/hadolint < ./backend/Dockerfile

  # =======================================================
  # FASE 2: BUILD, SCAN & PUSH
  # =======================================================
  build-and-push:
    needs: security-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐫 Setup QEMU (Emulador ARM)
        uses: docker/setup-qemu-action@v3

      - name: 🛠️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- 1. LOGINS ---
      - name: 🔐 Login to GHCR (Staging)
        if: github.ref == 'refs/heads/develop'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: ☁️ Configure AWS Credentials (Prod)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: 🔐 Login to AWS ECR (Prod)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      # --- 2. BACKEND (Go) ---
      - name: 🏗️ Build Backend (Local)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          load: true
          tags: portfolio-backend:local
          platforms: linux/arm64

      - name: 🛡️ Trivy Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'portfolio-backend:local'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: 🚀 Push Backend
        run: |
          TAG=${{ github.ref == 'refs/heads/main' && format('{0}.dkr.ecr.us-east-2.amazonaws.com/portfolio-sre-backend:prod', secrets.AWS_ACCOUNT_ID) || format('ghcr.io/{0}/ez-backend:stage', github.actor) }}
          docker tag portfolio-backend:local $TAG
          docker push $TAG

      # --- 3. FRONTEND (Hugo + Nginx) ---
      - name: 🏗️ Build Frontend (Local)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: portfolio-frontend:local
          platforms: linux/arm64

      - name: 🛡️ Trivy Scan (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'portfolio-frontend:local'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: 🚀 Push Frontend
        run: |
          TAG=${{ github.ref == 'refs/heads/main' && format('{0}.dkr.ecr.us-east-2.amazonaws.com/portfolio-sre-frontend:prod', secrets.AWS_ACCOUNT_ID) || format('ghcr.io/{0}/ez-frontend:stage', github.actor) }}
          docker tag portfolio-frontend:local $TAG
          docker push $TAG