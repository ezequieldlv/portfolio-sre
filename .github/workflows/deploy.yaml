name: CI/CD Pipeline - Portfolio Prime

on:
  push:
    branches: [main, develop]

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  # =======================================================
  # FASE 0: AUDITORÍA DE PIPELINE (Meta-Seguridad)
  # =======================================================
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🕵️‍♂️ Validar sintaxis de GitHub Actions
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  # =======================================================
  # FASE 1: AUDITORÍA ESTÁTICA (Código y Secretos)
  # =======================================================
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🕵️‍♂️ Trufflehog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.sha }}

      - name: 🐳 Hadolint (Linter de Dockerfiles)
        run: |
          docker run --rm -i hadolint/hadolint < ./frontend/Dockerfile
          docker run --rm -i hadolint/hadolint < ./backend/Dockerfile

  # =======================================================
  # FASE 2: BUILD & PUSH (Nativo ARM64)
  # =======================================================
  build-and-push:
    needs: security-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🐫 Setup QEMU (Emulador ARM)
        uses: docker/setup-qemu-action@v3

      - name: 🛠️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- LOGINS ---
      - name: 🔐 Login to GHCR (Staging)
        if: github.ref == 'refs/heads/develop'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: ☁️ Configure AWS Credentials (Prod)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: 🔐 Login to AWS ECR (Prod)
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      # --- VARIABLES DE ENTORNO DINÁMICAS ---
      - name: 🚀 Push Backend
        run: |
          TAG="${{ github.ref == 'refs/heads/main' && format('{0}.dkr.ecr.us-east-2.amazonaws.com/portfolio-sre-backend:prod', secrets.AWS_ACCOUNT_ID) || format('ghcr.io/{0}/ez-backend:stage', github.actor) }}"
          docker tag portfolio-backend:local "$TAG"
          docker push "$TAG"

      - name: 🚀 Push Frontend
        run: |
          TAG="${{ github.ref == 'refs/heads/main' && format('{0}.dkr.ecr.us-east-2.amazonaws.com/portfolio-sre-frontend:prod', secrets.AWS_ACCOUNT_ID) || format('ghcr.io/{0}/ez-frontend:stage', github.actor) }}"
          docker tag portfolio-frontend:local "$TAG"
          docker push "$TAG"

      # --- SCAN DE VULNERABILIDADES (Filesystem en lugar de Imagen) ---
      - name: 🛡️ Trivy Scan (Source Code)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # --- BUILD & PUSH DIRECTO A AWS/GHCR (ARM64) ---
      - name: 🚀 Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: ${{ env.BACKEND_TAG }}

      - name: 🚀 Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: linux/arm64
          tags: ${{ env.FRONTEND_TAG }}